<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#F3F6F3" />

    <!-- Primary meta (defaults; per-page values are set at runtime via the Seo component) -->
    <title>Korrente — Energy Storage Solutions for a Stronger Grid</title>
    <meta
      name="description"
      content="Korrente delivers smart, scalable and reliable energy storage systems that empower the energy transition across Europe."
    />
    <link rel="canonical" href="https://www.korrente.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Korrente" />
    <meta property="og:title" content="Korrente — Energy Storage Solutions for a Stronger Grid" />
    <meta
      property="og:description"
      content="Smart, scalable energy storage that empowers the energy transition across Europe."
    />
    <meta property="og:url" content="https://www.korrente.com/" />
    <meta property="og:image" content="/og-image.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Korrente — Energy Storage Solutions for a Stronger Grid" />
    <meta
      name="twitter:description"
      content="Smart, scalable energy storage that empowers the energy transition across Europe."
    />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- Fonts: Manrope (display) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Single-Page Apps for GitHub Pages — decodes the path 404.html
      // re-encoded into the query string, restoring the real URL via
      // history.replaceState before React Router (below) reads it.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
