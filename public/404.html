<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Korrente</title>
    <script>
      // Single-Page Apps for GitHub Pages (https://github.com/rafgraph/spa-github-pages).
      // GitHub Pages has no server-side rewrite rules, so a direct visit or
      // refresh on a deep route (e.g. /korrente/solutions) hits this file.
      // It re-encodes the real path into a query string and redirects to
      // index.html, which decodes it back (see the matching script in
      // index.html) before React Router ever sees the URL.
      var pathSegmentsToKeep = 1 // keep "/korrente" as the base path
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      )
    </script>
  </head>
  <body></body>
</html>
